<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Uploader - imgBB API</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366F1;
            --primary-dark: #4F46E5;
            --primary-light: #8B5CF6;
            --accent: #10B981;
            --danger: #EF4444;
            --background: #FFFFFF;
            --surface: #F8FAFC;
            --card: #F1F5F9;
            --text: #1E293B;
            --text-secondary: #64748B;
            --border: #E2E8F0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            --radius: 16px;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dark-mode {
            --primary: #8B5CF6;
            --primary-dark: #7C3AED;
            --primary-light: #A78BFA;
            --accent: #06D6A0;
            --danger: #EF4444;
            --background: #0F172A;
            --surface: #1E293B;
            --card: #334155;
            --text: #F8FAFC;
            --text-secondary: #CBD5E1;
            --border: #475569;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--background);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
            transition: var(--transition);
            background-image: 
                radial-gradient(at 80% 20%, rgba(99, 102, 241, 0.08) 0px, transparent 50%),
                radial-gradient(at 20% 80%, rgba(16, 185, 129, 0.08) 0px, transparent 50%);
        }

        .dark-mode body {
            background-image: 
                radial-gradient(at 80% 20%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 20% 80%, rgba(6, 214, 160, 0.1) 0px, transparent 50%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header Styles */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 20px 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: var(--transition);
        }

        .theme-toggle {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: var(--transition);
            box-shadow: var(--shadow);
            color: var(--text);
        }

        .theme-toggle:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        /* Upload Section */
        .upload-section {
            margin-bottom: 40px;
        }

        .upload-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 40px;
            text-align: center;
            border: 2px dashed var(--border);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .upload-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.05), transparent);
            transition: var(--transition);
        }

        .upload-card:hover::before {
            left: 100%;
        }

        .upload-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .upload-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            color: var(--primary);
            filter: drop-shadow(0 4px 8px rgba(99, 102, 241, 0.3));
            transition: var(--transition);
        }

        .upload-text {
            font-size: 1.3rem;
            margin-bottom: 25px;
            color: var(--text);
            font-weight: 600;
            transition: var(--transition);
        }

        .upload-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        .upload-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 25px rgba(99, 102, 241, 0.4);
        }

        .file-input {
            display: none;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin: 25px 0;
            justify-content: center;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            box-shadow: var(--shadow);
        }

        .clear-btn {
            background: var(--danger);
            color: white;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        /* Results Section */
        .results-section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text);
            transition: var(--transition);
        }

        .section-title i {
            color: var(--accent);
            transition: var(--transition);
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .image-card {
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
            transition: var(--transition);
            border: 1px solid var(--border);
            position: relative;
            box-shadow: var(--shadow);
        }

        .image-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            border-color: var(--primary);
        }

        .image-preview {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid var(--border);
            transition: var(--transition);
        }

        .image-info {
            padding: 20px;
        }

        .image-name {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: var(--transition);
        }

        .image-meta {
            display: flex;
            justify-content: space-between;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 15px;
            transition: var(--transition);
        }

        .generate-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), #0DA271);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(16, 185, 129, 0.4);
        }

        .generate-btn:disabled {
            background: var(--border);
            color: var(--text-secondary);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .links-container {
            display: none;
            padding: 20px;
            background: var(--card);
            border-radius: 0 0 var(--radius) var(--radius);
            animation: slideDown 0.3s ease-out;
            transition: var(--transition);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .link-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            padding: 12px;
            background: var(--surface);
            border-radius: 8px;
            border: 1px solid var(--border);
            transition: var(--transition);
        }

        .link-item:hover {
            border-color: var(--primary);
            transform: translateX(5px);
            box-shadow: var(--shadow);
        }

        .link-type {
            min-width: 100px;
            font-weight: 600;
            color: var(--accent);
            transition: var(--transition);
        }

        .link-text {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding: 0 12px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            transition: var(--transition);
        }

        .copy-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .copy-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        /* Progress Bar */
        .progress-container {
            display: none;
            margin: 20px 0;
            background: var(--surface);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--text);
            transition: var(--transition);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--card);
            border-radius: 4px;
            overflow: hidden;
            transition: var(--transition);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--primary));
            width: 0%;
            transition: width 0.4s ease;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* Telegram Section */
        .telegram-section {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 30px;
            text-align: center;
            margin-top: 40px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .telegram-icon {
            font-size: 3rem;
            color: #0088cc;
            margin-bottom: 15px;
        }

        .telegram-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text);
            transition: var(--transition);
        }

        .telegram-description {
            color: var(--text-secondary);
            margin-bottom: 20px;
            font-size: 1rem;
            transition: var(--transition);
        }

        .telegram-btn {
            background: #0088cc;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            box-shadow: 0 8px 20px rgba(0, 136, 204, 0.3);
        }

        .telegram-btn:hover {
            background: #0077b5;
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 136, 204, 0.4);
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--surface);
            color: var(--text);
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(400px);
            opacity: 0;
            transition: var(--transition);
            z-index: 1000;
            border-left: 4px solid var(--accent);
        }

        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        .toast.error {
            border-left-color: var(--danger);
        }

        .toast.error i {
            color: var(--danger);
        }

        .toast i {
            font-size: 1.3rem;
            color: var(--accent);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .image-grid {
                grid-template-columns: 1fr;
            }
            
            .upload-card {
                padding: 30px 20px;
            }
            
            .header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
            
            .link-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .link-type {
                min-width: auto;
            }
            
            .link-text {
                width: 100%;
                padding: 0;
            }

            .action-buttons {
                flex-direction: column;
                align-items: center;
            }

            .action-btn {
                width: 200px;
                justify-content: center;
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--surface);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-dark);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-cloud-upload-alt"></i>
                </div>
                <div class="logo-text">Image Uploader</div>
            </div>
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
                <span>Dark Mode</span>
            </button>
        </div>

        <!-- Upload Section -->
        <section class="upload-section">
            <div class="upload-card" id="uploadArea">
                <div class="upload-icon">
                    <i class="fas fa-cloud-upload-alt"></i>
                </div>
                <div class="upload-text">Drag & Drop Your Images Here</div>
                <input type="file" id="fileInput" class="file-input" accept="image/*" multiple>
                <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
                    <i class="fas fa-folder-open"></i>
                    Browse Files
                </button>
                <div style="margin-top: 15px; color: var(--text-secondary); font-size: 0.9rem;">
                    Supports JPG, PNG, WebP • Max 10MB per file
                </div>
            </div>
        </section>

        <!-- Action Buttons -->
        <div class="action-buttons" id="actionButtons" style="display: none;">
            <button class="action-btn clear-btn" onclick="clearAllImages()">
                <i class="fas fa-trash"></i>
                Clear All Images
            </button>
        </div>

        <!-- Progress Bar -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-header">
                <span>Uploading to imgBB...</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div id="progressText" style="text-align: center; margin-top: 10px; color: var(--text-secondary);"></div>
        </div>

        <!-- Results Section -->
        <section class="results-section" id="resultsSection" style="display: none;">
            <div class="section-title">
                <i class="fas fa-images"></i>
                <span>Uploaded Images</span>
            </div>
            <div class="image-grid" id="imageGrid"></div>
        </section>

        <!-- Telegram Section -->
        <section class="telegram-section">
            <div class="telegram-icon">
                <i class="fab fa-facebook"></i>
            </div>
            <div class="telegram-title">SUPPORT</div>
            <div class="telegram-description">
                Stay updated with the latest features, tips, and updates from our community.
            </div>
            <a href="https://www.facebook.com/heritina25" class="telegram-btn" target="_blank">
                <i class="fab fa-facebook"></i>
                MESSAGE 
            </a>
        </section>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script>
        // API Configuration
        const API_KEY = '00203de3898d954a87e1f28350651d4b';
        const API_URL = 'https://api.imgbb.com/1/upload';
        
        // DOM Elements
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressPercent = document.getElementById('progressPercent');
        const progressText = document.getElementById('progressText');
        const resultsSection = document.getElementById('resultsSection');
        const imageGrid = document.getElementById('imageGrid');
        const actionButtons = document.getElementById('actionButtons');
        const themeToggle = document.getElementById('themeToggle');
        const toast = document.getElementById('toast');

        // Store uploaded images data
        let uploadedImages = [];

        // Initialize
        function init() {
            setupEventListeners();
            checkSavedTheme();
        }

        // Setup event listeners
        function setupEventListeners() {
            // File input change
            fileInput.addEventListener('change', handleFileSelect);
            
            // Drag and drop
            uploadArea.addEventListener('dragover', handleDragOver);
            uploadArea.addEventListener('dragleave', handleDragLeave);
            uploadArea.addEventListener('drop', handleDrop);
            
            // Paste from clipboard
            document.addEventListener('paste', handlePaste);
            
            // Theme toggle
            themeToggle.addEventListener('click', toggleTheme);
        }

        // Handle file selection
        function handleFileSelect(e) {
            const files = Array.from(e.target.files);
            uploadFiles(files);
        }

        // Handle drag over
        function handleDragOver(e) {
            e.preventDefault();
            uploadArea.style.borderColor = 'var(--primary)';
            uploadArea.style.background = 'rgba(99, 102, 241, 0.05)';
        }

        // Handle drag leave
        function handleDragLeave(e) {
            e.preventDefault();
            uploadArea.style.borderColor = 'var(--border)';
            uploadArea.style.background = 'var(--surface)';
        }

        // Handle drop
        function handleDrop(e) {
            e.preventDefault();
            uploadArea.style.borderColor = 'var(--border)';
            uploadArea.style.background = 'var(--surface)';
            const files = Array.from(e.dataTransfer.files).filter(file => file.type.startsWith('image/'));
            uploadFiles(files);
        }

        // Handle paste from clipboard
        function handlePaste(e) {
            const items = e.clipboardData.items;
            for (let item of items) {
                if (item.type.startsWith('image/')) {
                    const blob = item.getAsFile();
                    uploadFiles([blob]);
                    break;
                }
            }
        }

        // Upload files to imgBB
        async function uploadFiles(files) {
            if (files.length === 0) return;

            progressContainer.style.display = 'block';
            resultsSection.style.display = 'block';
            actionButtons.style.display = 'flex';

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                
                // Show progress
                const progress = ((i + 1) / files.length) * 100;
                progressFill.style.width = `${progress}%`;
                progressPercent.textContent = `${Math.round(progress)}%`;
                progressText.textContent = `Uploading ${file.name}...`;

                try {
                    // Upload to imgBB
                    const formData = new FormData();
                    formData.append('image', file);
                    
                    const response = await fetch(`${API_URL}?key=${API_KEY}`, {
                        method: 'POST',
                        body: formData
                    });

                    const data = await response.json();
                    
                    if (data.success) {
                        const imageData = {
                            id: Date.now() + i,
                            url: data.data.url,
                            display_url: data.data.display_url,
                            thumb_url: data.data.thumb.url,
                            delete_url: data.data.delete_url,
                            date: new Date().toISOString(),
                            name: file.name,
                            size: file.size
                        };
                        
                        // Store image data
                        uploadedImages.push(imageData);
                        
                        // Display result
                        displayImageCard(imageData);
                        
                        // Show success toast
                        showToast('Image uploaded to imgBB successfully!', 'success');
                    } else {
                        console.error('Upload failed:', data);
                        showToast('Upload failed: ' + (data.error.message || 'Unknown error'), 'error');
                    }
                } catch (error) {
                    console.error('Upload error:', error);
                    showToast('Upload error: ' + error.message, 'error');
                }
            }

            // Hide progress after completion
            setTimeout(() => {
                progressContainer.style.display = 'none';
                progressFill.style.width = '0%';
                progressPercent.textContent = '0%';
                progressText.textContent = '';
            }, 1000);
        }

        // Display image card
        function displayImageCard(imageData) {
            const imageCard = document.createElement('div');
            imageCard.className = 'image-card';
            imageCard.innerHTML = `
                <img src="${imageData.thumb_url}" alt="Preview" class="image-preview">
                <div class="image-info">
                    <div class="image-name">${imageData.name}</div>
                    <div class="image-meta">
                        <span>${formatFileSize(imageData.size)}</span>
                        <span>${new Date().toLocaleDateString()}</span>
                    </div>
                    <button class="generate-btn" onclick="generateLinks(this, '${imageData.url}', '${imageData.display_url}', '${imageData.thumb_url}')">
                        <i class="fas fa-link"></i>
                        Generate Links
                    </button>
                </div>
                <div class="links-container"></div>
            `;
            imageGrid.appendChild(imageCard);
        }

        // Generate links when button is clicked
        function generateLinks(button, imageUrl, displayUrl, thumbUrl) {
            const imageCard = button.closest('.image-card');
            const linksContainer = imageCard.querySelector('.links-container');
            
            // Create the links HTML
            linksContainer.innerHTML = `
                <div class="link-item">
                    <span class="link-type">Direct URL</span>
                    <input type="text" class="link-text" value="${imageUrl}" readonly>
                    <button class="copy-btn" onclick="copyToClipboard('${imageUrl}', 'Direct URL copied!')">
                        <i class="fas fa-copy"></i>
                        Copy
                    </button>
                </div>
                <div class="link-item">
                    <span class="link-type">Display URL</span>
                    <input type="text" class="link-text" value="${displayUrl}" readonly>
                    <button class="copy-btn" onclick="copyToClipboard('${displayUrl}', 'Display URL copied!')">
                        <i class="fas fa-copy"></i>
                        Copy
                    </button>
                </div>
                <div class="link-item">
                    <span class="link-type">Thumbnail URL</span>
                    <input type="text" class="link-text" value="${thumbUrl}" readonly>
                    <button class="copy-btn" onclick="copyToClipboard('${thumbUrl}', 'Thumbnail URL copied!')">
                        <i class="fas fa-copy"></i>
                        Copy
                    </button>
                </div>
                <div class="link-item">
                    <span class="link-type">HTML Code</span>
                    <input type="text" class="link-text" value='<img src="${imageUrl}" alt="Image">' readonly>
                    <button class="copy-btn" onclick="copyToClipboard('<img src=&quot;${imageUrl}&quot; alt=&quot;Image&quot;>', 'HTML code copied!')">
                        <i class="fas fa-copy"></i>
                        Copy
                    </button>
                </div>
                <div class="link-item">
                    <span class="link-type">Markdown</span>
                    <input type="text" class="link-text" value='![Image](${imageUrl})' readonly>
                    <button class="copy-btn" onclick="copyToClipboard('![Image](${imageUrl})', 'Markdown copied!')">
                        <i class="fas fa-copy"></i>
                        Copy
                    </button>
                </div>
            `;
            
            // Show the links container
            linksContainer.style.display = 'block';
            
            // Change button text
            button.innerHTML = '<i class="fas fa-check"></i> Links Generated';
            button.style.background = 'var(--border)';
            button.disabled = true;
            
            showToast('Links generated successfully!', 'success');
        }

        // Clear all images
        function clearAllImages() {
            if (uploadedImages.length === 0) {
                showToast('No images to clear', 'error');
                return;
            }

            if (confirm('Are you sure you want to clear all uploaded images?')) {
                imageGrid.innerHTML = '';
                uploadedImages = [];
                resultsSection.style.display = 'none';
                actionButtons.style.display = 'none';
                fileInput.value = '';
                showToast('All images cleared successfully', 'success');
            }
        }

        // Toggle theme
        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark-mode');
            const icon = themeToggle.querySelector('i');
            const text = themeToggle.querySelector('span');
            
            if (isDark) {
                icon.className = 'fas fa-sun';
                text.textContent = 'Light Mode';
            } else {
                icon.className = 'fas fa-moon';
                text.textContent = 'Dark Mode';
            }
            
            // Save theme preference
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // Check saved theme
        function checkSavedTheme() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.body.classList.add('dark-mode');
                const icon = themeToggle.querySelector('i');
                const text = themeToggle.querySelector('span');
                icon.className = 'fas fa-sun';
                text.textContent = 'Light Mode';
            }
        }

        // Copy to clipboard
        function copyToClipboard(text, message) {
            navigator.clipboard.writeText(text).then(() => {
                showToast(message, 'success');
            }).catch(err => {
                console.error('Failed to copy: ', err);
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showToast(message, 'success');
            });
        }

        // Format file size
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Show toast notification
        function showToast(message, type) {
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                <span>${message}</span>
            `;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Initialize the app
        init();
    </script>
</body>
</html>
